<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zigns Display</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">

<!-- Fabric.js (StaticCanvas for designed slides) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<!-- QR Code generator (used by QR slide type) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, collection, onSnapshot, setDoc, addDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYsip5Xx2N-gewNDqTj7EAnvabfbrBQTY",
    authDomain: "digital-signage-2.firebaseapp.com",
    projectId: "digital-signage-2",
    storageBucket: "digital-signage-2.firebasestorage.app",
    messagingSenderId: "1004548485661",
    appId: "1:1004548485661:web:b3ab204d94943716674cf4"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── Screen identity ───────────────────────────────────────────────────────
  // ?slideshow=xxx in URL = preview iframe from admin panel (skip screen registration)
  // Otherwise: assign a persistent screenId and get slideshow assignment from Firestore
  const urlParams = new URLSearchParams(window.location.search);
  const previewId = urlParams.get("slideshow");

  // ?slot=2 (or any value) uses a separate localStorage key so two windows on the
  // same computer can each maintain an independent screen identity and pairing.
  const screenSlot = urlParams.get("slot") || "";
  const STORAGE_KEY = screenSlot ? `signage-screen-id-${screenSlot}` : "signage-screen-id";

  let screenId = localStorage.getItem(STORAGE_KEY); // may be null if unregistered

  // ── Offline cache ─────────────────────────────────────────────────────────
  function saveCache(id, data) {
    try { localStorage.setItem("signage-cache-" + id, JSON.stringify(data)); } catch(e) {}
  }
  function loadCache(id) {
    try {
      const raw = localStorage.getItem("signage-cache-" + id);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  }

  // ── State ─────────────────────────────────────────────────────────────────
  let slides        = [];
  let current       = 0;
  let timer         = null;
  let defaultDwell  = 6000;
  let clockInterval = null;

  // ── Resilience state ──────────────────────────────────────────────────────
  let isOffline         = false;
  let reconnectBackoff  = 5000;            // starts 5 s, doubles on each error
  const MAX_BACKOFF     = 5 * 60 * 1000;  // cap at 5 minutes
  let reconnectTimer    = null;
  let activeSlideshowId = null;
  let screenTimezone    = null; // IANA string or 'local'/null (falls back to device time)
  let lastUpdateTime    = null;
  let watchdogHandle    = null;
  let debugVisible      = false;
  const PAGE_LOAD_TIME  = Date.now();

  // ── Analytics batch queue ─────────────────────────────────────────────────
  let analyticsQueue  = [];
  let analyticsOrgId  = null;   // set when screen doc is known
  let currentSlideshowIdForAnalytics = null;
  let slideViewStart  = null;   // timestamp when current slide became visible

  function queueAnalyticsEvent(event) {
    if (!analyticsOrgId) return;
    analyticsQueue.push({ ...event, timestamp: new Date().toISOString() });
  }

  async function flushAnalytics() {
    if (!analyticsOrgId || !analyticsQueue.length) return;
    const batch = analyticsQueue.splice(0);
    const col   = collection(db, 'organizations', analyticsOrgId, 'analytics');
    for (const ev of batch) {
      try { await addDoc(col, ev); } catch(e) { /* non-critical */ }
    }
  }

  setInterval(flushAnalytics, 60 * 1000);

  // ── DOM refs ─────────────────────────────────────────────────────────────────
  const stageA        = document.getElementById("stageA");
  const stageB        = document.getElementById("stageB");
  const stageDesigned = document.getElementById("stageDesigned");
  const stageVideo    = document.getElementById("stageVideo");
  const videoEl       = document.getElementById("videoEl");
  const stageYoutube  = document.getElementById("stageYoutube");
  const iframeYoutube = document.getElementById("iframeYoutube");
  const stageWebpage  = document.getElementById("stageWebpage");
  const iframeWebpage = document.getElementById("iframeWebpage");
  const stageClock    = document.getElementById("stageClock");
  const clockEl       = document.getElementById("clockEl");
  const stageQr       = document.getElementById("stageQr");
  const stageWeather  = document.getElementById("stageWeather");
  const stageCountdown = document.getElementById("stageCountdown");
  const loader        = document.getElementById("loader");
  const errBox        = document.getElementById("errBox");
  const errMsg        = document.getElementById("errMsg");
  let   active        = stageA;
  let   inactive      = stageB;

  // ── Fabric.js StaticCanvas for designed slides ────────────────────────────
  const LOGICAL_W = 1920;
  const LOGICAL_H = 1080;

  const displayFabric = new fabric.StaticCanvas("fabricDisplay", {
    width:             window.innerWidth,
    height:            window.innerHeight,
    renderOnAddRemove: false,
    enableRetinaScaling: false,
  });

  function fitFabricToScreen() {
    const w     = window.innerWidth;
    const h     = window.innerHeight;
    const scale = Math.min(w / LOGICAL_W, h / LOGICAL_H);
    const offX  = (w - LOGICAL_W * scale) / 2;
    const offY  = (h - LOGICAL_H * scale) / 2;
    displayFabric.setWidth(w);
    displayFabric.setHeight(h);
    displayFabric.setViewportTransform([scale, 0, 0, scale, offX, offY]);
    displayFabric.renderAll();
  }

  window.addEventListener("resize", fitFabricToScreen);

  // Sanitize Fabric.js canvas JSON — fixes invalid textBaseline values ('alphabetical' etc.)
  function sanitizeCanvasJson(jsonString) {
    const validBaselines = ['top', 'hanging', 'middle', 'alphabetic', 'ideographic', 'bottom'];
    try {
      const data = JSON.parse(jsonString);
      if (data.objects) {
        data.objects = data.objects.map(obj => {
          if (obj.textBaseline && !validBaselines.includes(obj.textBaseline)) {
            obj.textBaseline = 'alphabetic';
          }
          if (obj.styles) {
            Object.values(obj.styles).forEach(line => {
              Object.values(line).forEach(charStyle => {
                if (charStyle.textBaseline && !validBaselines.includes(charStyle.textBaseline)) {
                  charStyle.textBaseline = 'alphabetic';
                }
              });
            });
          }
          return obj;
        });
      }
      return JSON.stringify(data);
    } catch(e) {
      return jsonString;
    }
  }

  // Preload any Google Fonts referenced in a canvasJson before rendering
  const SYSTEM_FONTS = new Set([
    'Arial','Arial Black','Helvetica','Georgia','Impact','Verdana',
    'Trebuchet MS','Times New Roman','Courier New','Comic Sans MS',
  ]);

  async function preloadFontsForSlide(canvasJson) {
    try {
      const data = typeof canvasJson === 'string' ? JSON.parse(canvasJson) : canvasJson;
      const families = new Set();
      (data.objects || []).forEach(obj => { if (obj.fontFamily) families.add(obj.fontFamily); });
      const toLoad = [...families].filter(f => !SYSTEM_FONTS.has(f));
      if (!toLoad.length) return;
      const url = 'https://fonts.googleapis.com/css2?'
                + toLoad.map(f => 'family=' + f.replace(/ /g, '+')).join('&')
                + '&display=swap';
      if (document.querySelector(`link[href="${url}"]`)) return;
      await new Promise(resolve => {
        const link   = document.createElement('link');
        link.rel     = 'stylesheet';
        link.href    = url;
        link.onload  = resolve;
        link.onerror = resolve;
        document.head.appendChild(link);
      });
      await document.fonts.ready;
    } catch(e) {}
  }

  // ── Entrance Animations ───────────────────────────────────────────────────
  const _ANIM_EASE = {
    easeOut:   t => 1 - Math.pow(1 - t, 3),
    bounce:    t => {
      const n = 7.5625, d = 2.75;
      if (t < 1/d)        return n*t*t;
      else if (t < 2/d)   return n*(t -= 1.5/d)*t + 0.75;
      else if (t < 2.5/d) return n*(t -= 2.25/d)*t + 0.9375;
      else                return n*(t -= 2.625/d)*t + 0.984375;
    },
  };

  function _animInitProps(type, orig) {
    const D = 300;
    switch (type) {
      case 'fadeIn':       return { opacity: 0 };
      case 'slideInLeft':  return { opacity: 0, left: orig.left - D };
      case 'slideInRight': return { opacity: 0, left: orig.left + D };
      case 'slideInUp':    return { opacity: 0, top:  orig.top  + D };
      case 'slideInDown':  return { opacity: 0, top:  orig.top  - D };
      case 'zoomIn':       return { opacity: 0, scaleX: orig.scaleX * 0.05, scaleY: orig.scaleY * 0.05 };
      case 'bounceIn':     return { opacity: 0, scaleX: orig.scaleX * 0.05, scaleY: orig.scaleY * 0.05 };
      case 'flipIn':       return { opacity: 0, scaleX: 0 };
      default:             return null;
    }
  }

  function _runObjAnim(canvas, obj, type, durMs, orig) {
    const init   = _animInitProps(type, orig);
    if (!init) return;
    for (const k in init) obj.set(k, init[k]);
    canvas.renderAll();
    const ease  = type === 'bounceIn' ? _ANIM_EASE.bounce : _ANIM_EASE.easeOut;
    const t0    = performance.now();
    (function frame(now) {
      const p = Math.min((now - t0) / durMs, 1);
      const e = ease(p);
      for (const k in init) obj.set(k, init[k] + (orig[k] - init[k]) * e);
      canvas.renderAll();
      if (p < 1) requestAnimationFrame(frame);
      else { for (const k in orig) obj.set(k, orig[k]); canvas.renderAll(); }
    })(t0);
  }

  let pendingAnimations = [];   // populated by loadDesignedSlide, consumed by crossfadeTo

  // ── Ticker ────────────────────────────────────────────────────────────────
  const tickerWrap  = document.getElementById('tickerWrap');
  const tickerTrack = document.getElementById('tickerTrack');
  const tickerBadge = document.getElementById('tickerBadge');

  function hexToRgbaDisplay(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  let rssRefreshTimer = null;
  let _lastTickerText = null;  // prevents animation reset when content unchanged
  let _activeRssUrl   = null;  // RSS URL currently displayed
  let _rssCache       = {};    // url → last fetched text (survives stopTicker)

  function _applyTickerText(cfg, text) {
    // Skip re-render if content hasn't changed and ticker is already running
    if (text === _lastTickerText && tickerWrap.style.display !== 'none') return;
    _lastTickerText = text;

    const speeds     = { slow: 120, medium: 250, fast: 420 };
    const px_per_sec = speeds[cfg.tickerSpeed] || 120;
    const fullText   = text + (cfg.tickerSep || '  •  ');
    const fontSize   = cfg.tickerFontSize || 36;
    const barHeight  = fontSize * 2.4;
    const bgColor    = hexToRgbaDisplay(cfg.tickerBg || '#000000', cfg.tickerOpacity !== undefined ? cfg.tickerOpacity : 0.75);
    const badgeW     = 120;

    tickerWrap.style.height      = barHeight + 'px';
    tickerWrap.style.background  = bgColor;
    tickerWrap.className         = cfg.tickerPos === 'top' ? 'ticker-top' : 'ticker-bottom';
    tickerWrap.style.display     = 'block';
    tickerWrap.style.paddingLeft = badgeW + 'px';

    tickerBadge.style.width    = badgeW + 'px';
    tickerBadge.style.fontSize = (fontSize * 0.5) + 'px';

    const span1 = document.createElement('span');
    const span2 = document.createElement('span');
    [span1, span2].forEach(s => {
      s.textContent      = fullText;
      s.style.color      = cfg.tickerColor || '#ffffff';
      s.style.fontSize   = fontSize + 'px';
      s.style.fontFamily = "'Segoe UI', sans-serif";
      s.style.fontWeight = '400';
    });
    tickerTrack.innerHTML = '';
    tickerTrack.appendChild(span1);
    tickerTrack.appendChild(span2);

    requestAnimationFrame(() => {
      const w = span1.offsetWidth;
      if (w > 0) {
        const dur = (w / px_per_sec) + 's';
        tickerTrack.style.animation = 'none';
        void tickerTrack.offsetWidth; // trigger reflow
        tickerTrack.style.animation = `tickerScroll ${dur} linear infinite`;
      }
    });
  }

  function renderTicker(cfg) {
    if (rssRefreshTimer) { clearInterval(rssRefreshTimer); rssRefreshTimer = null; }

    if (cfg.rssUrl) {
      // Same URL already running and visible — just re-arm the refresh timer, no flicker
      if (cfg.rssUrl === _activeRssUrl && tickerWrap.style.display !== 'none') {
        rssRefreshTimer = setInterval(loadRss, 5 * 60 * 1000);
        return;
      }

      _activeRssUrl = cfg.rssUrl;
      const sep = cfg.tickerSep || '  •  ';

      async function loadRss() {
        try {
          const r = await fetch('/api/rss-proxy?url=' + encodeURIComponent(cfg.rssUrl));
          if (!r.ok) { _applyTickerText(cfg, cfg.tickerText || ''); return; }
          const data = await r.json();
          const text = data.headlines && data.headlines.length
            ? data.headlines.join(sep)
            : (cfg.tickerText || '');
          _rssCache[cfg.rssUrl] = text;
          _applyTickerText(cfg, text);
        } catch(e) {
          _applyTickerText(cfg, cfg.tickerText || '');
        }
      }

      // Show cached content immediately if available — no hide/flash while fetching
      if (_rssCache[cfg.rssUrl]) {
        _applyTickerText(cfg, _rssCache[cfg.rssUrl]);
      } else {
        tickerWrap.style.display = 'none';
      }

      loadRss();
      rssRefreshTimer = setInterval(loadRss, 5 * 60 * 1000);
    } else {
      _activeRssUrl = null;
      _applyTickerText(cfg, cfg.tickerText || '');
    }
  }

  function stopTicker() {
    if (rssRefreshTimer) { clearInterval(rssRefreshTimer); rssRefreshTimer = null; }
    _lastTickerText = null;
    _activeRssUrl   = null;
    // _rssCache intentionally kept — avoids re-flash if this URL is shown again soon
    tickerWrap.style.display = 'none';
    tickerTrack.innerHTML    = '';
  }

  function loadDesignedSlide(canvasJson) {
    return new Promise(async (resolve, reject) => {
      // Validate JSON up-front — rejects immediately for corrupt slides
      let parsed;
      try {
        parsed = typeof canvasJson === 'string' ? JSON.parse(canvasJson) : canvasJson;
      } catch(e) {
        return reject(new Error('Invalid canvasJson: ' + e.message));
      }

      try { await preloadFontsForSlide(parsed); } catch(_) {}

      // Extract tickerBar objects before passing to Fabric
      let tickerCfg = null;
      try {
        const remaining = [];
        (parsed.objects || []).forEach(obj => {
          if (obj.type === 'tickerBar') { tickerCfg = obj; }
          else { remaining.push(obj); }
        });
        if (tickerCfg) parsed = Object.assign({}, parsed, { objects: remaining });
      } catch(e) {}

      // Guard against Fabric.js hanging (e.g. waiting on a CORS image that never loads)
      const loadTimeout = setTimeout(() => reject(new Error('Canvas load timed out after 15 s')), 15000);

      try {
        displayFabric.loadFromJSON(sanitizeCanvasJson(JSON.stringify(parsed)), () => {
          clearTimeout(loadTimeout);
          fitFabricToScreen();
          if (tickerCfg) renderTicker(tickerCfg);
          else stopTicker();
          pendingAnimations = [];
          displayFabric.getObjects().forEach(obj => {
            const a = obj.animation;
            if (!a || !a.type || a.type === 'none') return;
            const orig = {
              opacity: obj.opacity ?? 1,
              left:    obj.left,
              top:     obj.top,
              scaleX:  obj.scaleX ?? 1,
              scaleY:  obj.scaleY ?? 1,
            };
            const init = _animInitProps(a.type, orig);
            if (!init) return;
            for (const k in init) obj.set(k, init[k]);
            pendingAnimations.push({ obj, type: a.type, delay: a.delay || 0, duration: a.duration || 0.8, orig });
          });
          if (pendingAnimations.length) displayFabric.renderAll();
          resolve();
        });
      } catch(e) {
        clearTimeout(loadTimeout);
        reject(e);
      }
    });
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function showError(msg) {
    errMsg.textContent   = msg;
    errBox.style.display = "flex";
  }

  function preload(url) {
    return new Promise((res, rej) => {
      const img   = new Image();
      img.onload  = () => res(url);
      img.onerror = () => rej(url);
      img.src     = url;
    });
  }

  // ── Clock slide ───────────────────────────────────────────────────────────
  const CLOCK_FONTS = {
    minimal: { ff: "'Courier New', monospace",            fw: '200', ls: '0.05em'  },
    bold:    { ff: "'Arial Black', 'DM Sans', sans-serif", fw: '900', ls: '-0.02em' },
    elegant: { ff: "Georgia, 'Times New Roman', serif",   fw: '400', ls: '0.06em'  },
  };

  function renderClockEl(config) {
    // Slide-level tz wins; otherwise fall back to the screen's configured tz.
    const slideTz  = (!config.timezone || config.timezone === 'local') ? null : config.timezone;
    const screenTz = (screenTimezone && screenTimezone !== 'local') ? screenTimezone : null;
    const tz       = slideTz || screenTz || undefined;
    const fmt12  = config.format === '12h';
    const now    = new Date();
    const tOpts  = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: fmt12, ...(tz ? { timeZone: tz } : {}) };
    const dOpts  = { weekday: 'long', month: 'long', day: 'numeric', ...(tz ? { timeZone: tz } : {}) };
    const timeStr = new Intl.DateTimeFormat('en-US', tOpts).format(now);
    const dateStr = new Intl.DateTimeFormat('en-US', dOpts).format(now);
    const font   = CLOCK_FONTS[config.fontStyle] || CLOCK_FONTS.minimal;

    clockEl.style.background    = config.bgColor    || '#000000';
    clockEl.style.color         = config.textColor  || '#ffffff';
    clockEl.style.fontFamily    = font.ff;
    clockEl.style.fontWeight    = font.fw;
    clockEl.style.letterSpacing = font.ls;

    const timeEl = clockEl.querySelector('.clock-time');
    const dateEl = clockEl.querySelector('.clock-date');
    if (timeEl) timeEl.textContent = timeStr;
    if (dateEl) {
      dateEl.textContent    = config.showDate !== false ? dateStr : '';
      dateEl.style.display  = config.showDate !== false ? '' : 'none';
    }
  }

  function startClock(slide) {
    stopClock();
    renderClockEl(slide);
    clockInterval = setInterval(() => renderClockEl(slide), 1000);
  }

  function stopClock() {
    if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
  }

  // ── QR Code slide ─────────────────────────────────────────────────────────
  function renderQr(slide) {
    const el = document.getElementById('qrEl');
    el.innerHTML = '';
    const size    = slide.size || 300;
    const isDark  = slide.theme === 'dark';
    const fgColor = slide.fgColor || (isDark ? '#ffffff' : '#000000');
    const bgColor = slide.bgColor || (isDark ? '#111111' : '#ffffff');

    stageWeather.style.opacity = "0";
    stageQr.style.background   = bgColor;

    try {
      new QRCode(el, {
        text:        slide.url || 'https://zigns.io',
        width:       size,
        height:      size,
        colorDark:   fgColor,
        colorLight:  bgColor,
        correctLevel: QRCode.CorrectLevel.M,
      });
    } catch(e) { console.warn('[QR] render error:', e.message); }

    const labelEl = document.getElementById('qrLabel');
    if (slide.label) {
      labelEl.textContent  = slide.label;
      labelEl.style.color  = fgColor;
      labelEl.style.display = '';
    } else {
      labelEl.style.display = 'none';
    }
  }

  // ── Weather slide ──────────────────────────────────────────────────────────
  let weatherRefreshTimer = null;
  const _weatherCache = {}; // keyed by "location|units", value: { data, ts }
  const WEATHER_TTL = 10 * 60 * 1000; // 10 min client-side cache

  function stopWeather() {
    if (weatherRefreshTimer) { clearInterval(weatherRefreshTimer); weatherRefreshTimer = null; }
  }

  async function renderWeather(slide) {
    stopWeather();
    const el = document.getElementById('weatherEl');

    async function load() {
      const cacheKey = `${slide.location || 'New York'}|${slide.units || 'imperial'}`;
      const cached   = _weatherCache[cacheKey];
      if (cached) {
        const age = Date.now() - cached.ts;
        if (cached.error) {
          if (age < WEATHER_TTL) {
            el.innerHTML = `<div class="wx-error">Weather unavailable<br><small>${cached.errorMsg}</small></div>`;
            return;
          }
        } else if (age < WEATHER_TTL) {
          _renderWeatherDOM(el, cached.data, slide);
          return;
        }
      }
      el.innerHTML = '<div class="wx-loading">Loading weather…</div>';
      try {
        const params = new URLSearchParams({ location: slide.location || 'New York', units: slide.units || 'imperial' });
        const ctrl   = new AbortController();
        const tmo    = setTimeout(() => ctrl.abort(), 15000);
        const r      = await fetch('/api/weather?' + params, { signal: ctrl.signal });
        clearTimeout(tmo);
        if (!r.ok) {
          const body = await r.json().catch(() => ({}));
          throw new Error(body.error || 'HTTP ' + r.status);
        }
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || 'Weather error');
        _weatherCache[cacheKey] = { data, ts: Date.now() };
        _renderWeatherDOM(el, data, slide);
      } catch(e) {
        _weatherCache[cacheKey] = { error: true, errorMsg: e.message, ts: Date.now() };
        el.innerHTML = `<div class="wx-error">Weather unavailable<br><small>${e.message}</small></div>`;
      }
    }
    await load();
    weatherRefreshTimer = setInterval(load, WEATHER_TTL);
  }

  function _renderWeatherDOM(el, data, slide) {
    const c       = data.current;
    const isDark  = slide.theme !== 'light';
    const unit    = data.units === 'metric' ? '°C' : '°F';
    const iconUrl = icon => `https://openweathermap.org/img/wn/${icon}@2x.png`;
    const fg      = isDark ? '#ffffff' : '#1a1a1a';
    const bg      = isDark ? '#0f172a' : '#f0f9ff';
    const divider = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
    const fBorder = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';

    stageWeather.style.background = bg;

    // Support legacy style:'forecast' field alongside new forecastDays
    const forecastDays = slide.forecastDays != null
      ? parseInt(slide.forecastDays, 10)
      : (slide.style === 'forecast' ? 3 : 0);
    const days = (data.forecast || []).slice(0, forecastDays);
    const hasForecast = days.length > 0;

    // Custom label overrides the city name returned by OWM
    const cityName   = slide.label?.trim() || c.city;
    const cityRegion = slide.label?.trim() ? null : c.country;

    // Day label: Today / Tmrw / Mon etc.
    const todayStr    = new Date().toDateString();
    const tomorrowStr = new Date(Date.now() + 86400000).toDateString();
    function fDayLabel(dt) {
      const d = new Date(dt * 1000);
      if (d.toDateString() === todayStr)    return 'Today';
      if (d.toDateString() === tomorrowStr) return 'Tmrw';
      return d.toLocaleDateString('en-US', { weekday: 'short' });
    }
    function fDayDate(dt) { return new Date(dt * 1000).getDate(); }

    el.style.color = fg;

    const forecastHTML = hasForecast ? `
      <div class="wx-forecast" style="border-top:1px solid ${divider}">
        ${days.map((d, i) => `
          <div class="wx-fday" style="${i > 0 ? `border-left:1px solid ${fBorder}` : ''}">
            <div class="wx-fday-label">${fDayLabel(d.dt)}</div>
            <div class="wx-fday-date">${fDayDate(d.dt)}</div>
            <img class="wx-fday-icon" src="${iconUrl(d.icon)}" alt="${esc(d.desc)}">
            <div class="wx-fday-temps"><span class="wx-fday-hi">${d.high}°</span><span class="wx-fday-lo">${d.low}°</span></div>
            <div class="wx-fday-desc">${cap(d.desc)}</div>
          </div>`).join('')}
      </div>` : '';

    if (!hasForecast) {
      // Full-screen centered layout
      el.innerHTML = `
        <div class="wx-hero wx-centered">
          <div class="wx-city-name">${esc(cityName)}</div>
          ${cityRegion ? `<div class="wx-city-region">${esc(cityRegion)}</div>` : ''}
          <div class="wx-right">
            <img class="wx-icon" src="${iconUrl(c.icon)}" alt="${esc(c.desc)}">
            <div class="wx-temp-desc">
              <div class="wx-temp">${c.temp}${unit}</div>
              <div class="wx-desc">${cap(c.desc)}</div>
            </div>
          </div>
          <div class="wx-meta">Feels like ${c.feelsLike}${unit} · Humidity ${c.humidity}%</div>
        </div>`;
    } else {
      // Split: hero left/right + forecast strip
      el.innerHTML = `
        <div class="wx-hero">
          <div class="wx-left">
            <div class="wx-city-name">${esc(cityName)}</div>
            ${cityRegion ? `<div class="wx-city-region">${esc(cityRegion)}</div>` : ''}
            <div class="wx-meta">Feels like ${c.feelsLike}${unit} · Humidity ${c.humidity}%</div>
          </div>
          <div class="wx-right">
            <img class="wx-icon" src="${iconUrl(c.icon)}" alt="${esc(c.desc)}">
            <div class="wx-temp-desc">
              <div class="wx-temp">${c.temp}${unit}</div>
              <div class="wx-desc">${cap(c.desc)}</div>
            </div>
          </div>
        </div>
        ${forecastHTML}`;
    }
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

  // ── Countdown slide ────────────────────────────────────────────────────────
  let countdownTick = null;

  function stopCountdown() {
    if (countdownTick) { clearInterval(countdownTick); countdownTick = null; }
  }

  function renderCountdown(slide) {
    stopCountdown();

    const isDark = (slide.theme || 'dark') === 'dark';
    const accent = slide.accent || '#f07c00';
    stageCountdown.style.background = isDark ? '#0f172a' : '#f5f5f5';
    stageCountdown.style.color      = isDark ? '#ffffff' : '#111111';

    const labelEl = document.getElementById('cdLabelEl');
    const timerEl = document.getElementById('cdTimerEl');
    const endEl   = document.getElementById('cdEndEl');
    labelEl.textContent = slide.label || '';
    labelEl.style.display = slide.label ? '' : 'none';

    // Parse "YYYY-MM-DDTHH:MM" as local time
    const targetMs = slide.target ? new Date(slide.target).getTime() : NaN;
    if (!Number.isFinite(targetMs)) {
      timerEl.innerHTML = '';
      endEl.style.display = '';
      endEl.style.color   = accent;
      endEl.textContent   = 'Invalid date';
      return;
    }

    const units = slide.units || 'dhms';
    const parts = [];
    if (units.includes('d')) parts.push({ key: 'd', name: 'Days'    });
    if (units.includes('h')) parts.push({ key: 'h', name: 'Hours'   });
    if (units.includes('m')) parts.push({ key: 'm', name: 'Minutes' });
    if (units.includes('s')) parts.push({ key: 's', name: 'Seconds' });

    function tick() {
      const diff = targetMs - Date.now();
      if (diff <= 0) {
        timerEl.innerHTML = '';
        endEl.style.color = accent;
        endEl.textContent = slide.endMsg || '0';
        endEl.style.display = '';
        stopCountdown();
        return;
      }
      endEl.style.display = 'none';

      let remaining = Math.floor(diff / 1000);
      const showDays = units.includes('d');
      const showHrs  = units.includes('h');
      const showMin  = units.includes('m');
      const showSec  = units.includes('s');

      let d = 0, h = 0, m = 0, s = 0;
      if (showDays) { d = Math.floor(remaining / 86400); remaining -= d * 86400; }
      if (showHrs)  { h = Math.floor(remaining / 3600);  remaining -= h * 3600;  }
      if (showMin)  { m = Math.floor(remaining / 60);    remaining -= m * 60;    }
      if (showSec)  { s = remaining; }

      const pad = n => String(n).padStart(2, '0');
      const vals = { d: String(d), h: pad(h), m: pad(m), s: pad(s) };

      timerEl.innerHTML = parts.map(p =>
        `<div class="cd-unit"><div class="cd-num" style="color:${accent}">${vals[p.key]}</div><div class="cd-name">${p.name}</div></div>`
      ).join('');
    }

    tick();
    // Only tick each second if seconds are shown; otherwise minute is enough.
    const period = units.includes('s') ? 1000 : 30000;
    countdownTick = setInterval(tick, period);
  }

  // ── Multi-Zone Layout ─────────────────────────────────────────────────────

  function renderMultizone(slide) {
    stopMultizone();
    if (!slide.zones || !slide.zones.length) return;

    slide.zones.forEach(zone => {
      const zoneEl = document.createElement('div');
      zoneEl.className = 'mz-zone';
      zoneEl.style.cssText = `left:${zone.x}%;top:${zone.y}%;width:${zone.w}%;height:${zone.h}%;overflow:hidden;`;
      stageMultizone.appendChild(zoneEl);
      _mzRenderZoneContent(zoneEl, zone);
    });
  }

  function _mzRenderZoneContent(zoneEl, zone) {
    const type = zone.contentType || 'image';
    const c    = zone.content || {};

    if (type === 'image') {
      zoneEl.style.background = `url('${c.url}') center / ${c.fit || 'cover'} no-repeat #000`;

    } else if (type === 'video') {
      const v = document.createElement('video');
      v.src = c.url; v.autoplay = true; v.muted = true; v.loop = true;
      v.style.cssText = 'width:100%;height:100%;object-fit:cover;';
      zoneEl.appendChild(v);

    } else if (type === 'youtube') {
      const id  = c.videoId || c.url || '';
      const ifr = document.createElement('iframe');
      ifr.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&loop=1&playlist=${id}`;
      ifr.style.cssText = 'width:100%;height:100%;border:none;';
      ifr.allow = 'autoplay; encrypted-media';
      zoneEl.appendChild(ifr);

    } else if (type === 'webpage') {
      const ifr = document.createElement('iframe');
      ifr.src = c.url;
      ifr.style.cssText = 'width:100%;height:100%;border:none;';
      zoneEl.appendChild(ifr);

    } else {
      // Widget zone: render at 1920×1080 then scale to cover (fill zone, clip overflow)
      const sw   = window.innerWidth, sh = window.innerHeight;
      const zw   = zone.w / 100 * sw, zh = zone.h / 100 * sh;
      const scale = Math.max(zw / 1920, zh / 1080);
      const tx    = (zw - 1920 * scale) / 2;
      const ty    = (zh - 1080 * scale) / 2;

      const inner = document.createElement('div');
      inner.className  = 'mz-zone-inner';
      inner.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
      zoneEl.appendChild(inner);

      if      (type === 'clock')     _mzRenderClock(inner, c);
      else if (type === 'weather')   _mzRenderWeather(inner, c);
      else if (type === 'qr')        _mzRenderQr(inner, c);
      else if (type === 'countdown') _mzRenderCountdown(inner, c);
    }
  }

  // Clock zone renderer — self-contained version that writes to `el`
  function _mzRenderClock(el, config) {
    const CLOCK_FONTS = {
      minimal: { ff: "'Courier New', monospace",            fw: '200', ls: '0.05em'  },
      bold:    { ff: "'Arial Black', 'DM Sans', sans-serif", fw: '900', ls: '-0.02em' },
      elegant: { ff: "Georgia, 'Times New Roman', serif",   fw: '400', ls: '0.06em'  },
    };
    const font = CLOCK_FONTS[config.fontStyle] || CLOCK_FONTS.minimal;
    el.style.cssText += `background:${config.bgColor||'#000'};color:${config.textColor||'#fff'};
      font-family:${font.ff};font-weight:${font.fw};letter-spacing:${font.ls};
      display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;`;
    el.innerHTML = '<div class="clock-time" style="font-size:15vw;line-height:1"></div><div class="clock-date" style="font-size:2.5vw;margin-top:0.5em;opacity:0.75"></div>';

    function tick() {
      const tz    = config.timezone && config.timezone !== 'local' ? config.timezone : undefined;
      const fmt12 = config.format !== '24h';
      const now   = new Date();
      const tOpts = { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: fmt12, ...(tz ? { timeZone: tz } : {}) };
      const dOpts = { weekday:'long', month:'long', day:'numeric', ...(tz ? { timeZone: tz } : {}) };
      const timeStr = new Intl.DateTimeFormat('en-US', tOpts).format(now);
      const dateStr = new Intl.DateTimeFormat('en-US', dOpts).format(now);
      const timeEl  = el.querySelector('.clock-time');
      const dateEl  = el.querySelector('.clock-date');
      if (timeEl) timeEl.textContent = timeStr;
      if (dateEl) {
        dateEl.textContent = config.showDate !== false ? dateStr : '';
        dateEl.style.display = config.showDate !== false ? '' : 'none';
      }
    }
    tick();
    const id = setInterval(tick, 1000);
    mzTimers.push({ type: 'interval', id });
  }

  // Weather zone renderer — reuses shared cache + _renderWeatherDOM logic
  async function _mzRenderWeather(el, config) {
    const loc      = config.location || 'New York';
    const units    = config.units    || 'imperial';
    const cacheKey = `${loc}|${units}`;

    // Adapt config to the shape _renderWeatherDOM expects
    const fakeSlide = { ...config, location: loc, units, theme: config.theme || 'dark' };

    el.style.cssText += 'overflow:hidden;';
    const inner = document.createElement('div');
    inner.className = 'wx-wrap';
    el.appendChild(inner);

    // Pre-set background synchronously so loading/error states are visible
    const isDarkWx = (config.theme || 'dark') !== 'light';
    el.style.background = isDarkWx ? '#0f172a' : '#f0f9ff';
    inner.style.color   = isDarkWx ? '#ffffff'  : '#1a1a1a';

    async function load() {
      // Re-read cache each call so interval refreshes benefit from prior fetches
      const nowCached = _weatherCache[cacheKey];
      if (nowCached) {
        const age = Date.now() - nowCached.ts;
        if (nowCached.error) {
          if (age < WEATHER_TTL) {
            // Show cached error — don't hit the API again until TTL expires
            inner.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;flex-direction:column;height:100%;gap:1vh;text-align:center;padding:2vw;">
              <div style="font-size:1.8vw;opacity:0.6">Weather unavailable</div>
              <div style="font-size:1.2vw;opacity:0.4">${nowCached.errorMsg}</div>
            </div>`;
            return;
          }
        } else if (age < WEATHER_TTL) {
          _renderWeatherDOMInEl(inner, nowCached.data, fakeSlide);
          return;
        }
      }
      inner.innerHTML = '<div class="wx-loading" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:1.8vw;opacity:0.5">Loading weather…</div>';
      try {
        const params = new URLSearchParams({ location: loc, units });
        const ctrl   = new AbortController();
        const tmo    = setTimeout(() => ctrl.abort(), 15000);
        const r      = await fetch('/api/weather?' + params, { signal: ctrl.signal });
        clearTimeout(tmo);
        if (!r.ok) { const b = await r.json().catch(()=>({})); throw new Error(b.error||'HTTP '+r.status); }
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || 'Weather error');
        _weatherCache[cacheKey] = { data, ts: Date.now() };
        _renderWeatherDOMInEl(inner, data, fakeSlide);
      } catch(e) {
        console.warn('[MZ Weather] fetch failed:', e.message);
        _weatherCache[cacheKey] = { error: true, errorMsg: e.message, ts: Date.now() };
        inner.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;flex-direction:column;height:100%;gap:1vh;text-align:center;padding:2vw;">
          <div style="font-size:1.8vw;opacity:0.6">Weather unavailable</div>
          <div style="font-size:1.2vw;opacity:0.4">${e.message}</div>
        </div>`;
      }
    }
    await load();
    const id = setInterval(load, WEATHER_TTL);
    mzTimers.push({ type: 'interval', id });
  }

  // Same as _renderWeatherDOM but writes bg to el instead of stageWeather
  function _renderWeatherDOMInEl(el, data, slide) {
    const c      = data.current;
    const isDark = slide.theme !== 'light';
    const unit   = data.units === 'metric' ? '°C' : '°F';
    const iconUrl = icon => `https://openweathermap.org/img/wn/${icon}@2x.png`;
    const fg     = isDark ? '#ffffff' : '#1a1a1a';
    const bg     = isDark ? '#0f172a' : '#f0f9ff';
    const divider = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
    const fBorder = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
    el.parentElement.style.background = bg;
    el.style.color = fg;

    const forecastDays = slide.forecastDays != null ? parseInt(slide.forecastDays, 10) : 0;
    const days = (data.forecast || []).slice(0, forecastDays);
    const hasForecast = days.length > 0;
    const cityName   = slide.label?.trim() || c.city;
    const cityRegion = slide.label?.trim() ? null : c.country;
    const todayStr    = new Date().toDateString();
    const tomorrowStr = new Date(Date.now() + 86400000).toDateString();
    function fDayLabel(dt) {
      const d = new Date(dt * 1000);
      if (d.toDateString() === todayStr)    return 'Today';
      if (d.toDateString() === tomorrowStr) return 'Tmrw';
      return d.toLocaleDateString('en-US', { weekday: 'short' });
    }
    const forecastHTML = hasForecast ? `
      <div class="wx-forecast" style="border-top:1px solid ${divider}">
        ${days.map((d,i) => `
          <div class="wx-fday" style="${i>0?`border-left:1px solid ${fBorder}`:''}">
            <div class="wx-fday-label">${fDayLabel(d.dt)}</div>
            <div class="wx-fday-date">${new Date(d.dt*1000).getDate()}</div>
            <img class="wx-fday-icon" src="${iconUrl(d.icon)}" alt="${esc(d.desc)}">
            <div class="wx-fday-temps"><span class="wx-fday-hi">${d.high}°</span><span class="wx-fday-lo">${d.low}°</span></div>
            <div class="wx-fday-desc">${cap(d.desc)}</div>
          </div>`).join('')}
      </div>` : '';

    if (!hasForecast) {
      el.innerHTML = `
        <div class="wx-hero wx-centered">
          <div class="wx-city-name">${esc(cityName)}</div>
          ${cityRegion ? `<div class="wx-city-region">${esc(cityRegion)}</div>` : ''}
          <div class="wx-right">
            <img class="wx-icon" src="${iconUrl(c.icon)}" alt="${esc(c.desc)}">
            <div class="wx-temp-desc">
              <div class="wx-temp">${c.temp}${unit}</div>
              <div class="wx-desc">${cap(c.desc)}</div>
            </div>
          </div>
          <div class="wx-meta">Feels like ${c.feelsLike}${unit} · Humidity ${c.humidity}%</div>
        </div>`;
    } else {
      el.innerHTML = `
        <div class="wx-hero">
          <div class="wx-left">
            <div class="wx-city-name">${esc(cityName)}</div>
            ${cityRegion ? `<div class="wx-city-region">${esc(cityRegion)}</div>` : ''}
            <div class="wx-meta">Feels like ${c.feelsLike}${unit} · Humidity ${c.humidity}%</div>
          </div>
          <div class="wx-right">
            <img class="wx-icon" src="${iconUrl(c.icon)}" alt="${esc(c.desc)}">
            <div class="wx-temp-desc">
              <div class="wx-temp">${c.temp}${unit}</div>
              <div class="wx-desc">${cap(c.desc)}</div>
            </div>
          </div>
        </div>
        ${forecastHTML}`;
    }
  }

  // QR zone renderer
  function _mzRenderQr(el, config) {
    const isDark  = config.theme !== 'light';
    const fgColor = config.fgColor || (isDark ? '#ffffff' : '#000000');
    const bgColor = config.bgColor || (isDark ? '#111111' : '#ffffff');
    el.style.cssText += `background:${bgColor};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;`;
    const qrEl = document.createElement('div');
    el.appendChild(qrEl);
    try {
      new QRCode(qrEl, {
        text: config.url || 'https://zigns.io',
        width: 300, height: 300,
        colorDark:  fgColor, colorLight: bgColor,
        correctLevel: QRCode.CorrectLevel.M,
      });
    } catch(e) { console.warn('[MZ QR]', e.message); }
    if (config.label) {
      const lbl = document.createElement('div');
      lbl.textContent = config.label;
      lbl.style.cssText = `font-size:2vw;font-weight:600;letter-spacing:0.02em;text-align:center;padding:0 40px;color:${fgColor}`;
      el.appendChild(lbl);
    }
  }

  // Countdown zone renderer
  function _mzRenderCountdown(el, config) {
    const isDark = (config.theme || 'dark') === 'dark';
    const accent = config.accent || '#f07c00';
    el.style.cssText += `background:${isDark?'#0f172a':'#f5f5f5'};color:${isDark?'#fff':'#111'};
      display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4vw;
      font-family:'Segoe UI',Arial,sans-serif;`;

    const labelEl = document.createElement('div');
    labelEl.className = 'cd-label';
    labelEl.textContent = config.label || '';
    labelEl.style.cssText = `font-size:3.2vw;font-weight:500;letter-spacing:0.04em;opacity:0.85;margin-bottom:3vh;${config.label ? '' : 'display:none'}`;
    const timerEl = document.createElement('div');
    timerEl.className = 'cd-timer';
    timerEl.style.cssText = 'display:flex;gap:2.5vw;justify-content:center;align-items:flex-end;';
    const endEl = document.createElement('div');
    endEl.className = 'cd-end';
    endEl.style.cssText = 'display:none;font-size:4vw;font-weight:700;';
    el.append(labelEl, timerEl, endEl);

    const targetMs = config.target ? new Date(config.target).getTime() : NaN;
    if (!Number.isFinite(targetMs)) {
      endEl.style.display = '';
      endEl.style.color   = accent;
      endEl.textContent   = 'Invalid date';
      return;
    }
    const units = config.units || 'dhms';
    const parts = [];
    if (units.includes('d')) parts.push({ key:'d', name:'Days'    });
    if (units.includes('h')) parts.push({ key:'h', name:'Hours'   });
    if (units.includes('m')) parts.push({ key:'m', name:'Minutes' });
    if (units.includes('s')) parts.push({ key:'s', name:'Seconds' });

    function tick() {
      const diff = targetMs - Date.now();
      if (diff <= 0) {
        timerEl.innerHTML = '';
        endEl.style.color = accent;
        endEl.textContent = config.endMsg || '0';
        endEl.style.display = '';
        return;
      }
      endEl.style.display = 'none';
      let rem = Math.floor(diff / 1000);
      const d = units.includes('d') ? Math.floor(rem / 86400) : 0; rem -= d * 86400;
      const h = units.includes('h') ? Math.floor(rem / 3600)  : 0; rem -= h * 3600;
      const m = units.includes('m') ? Math.floor(rem / 60)    : 0; rem -= m * 60;
      const s = units.includes('s') ? rem : 0;
      const pad = n => String(n).padStart(2,'0');
      const vals = { d: String(d), h: pad(h), m: pad(m), s: pad(s) };
      timerEl.innerHTML = parts.map(p =>
        `<div style="display:flex;flex-direction:column;align-items:center;min-width:11vw;">
           <div style="font-size:12vw;font-weight:800;line-height:1;color:${accent}">${vals[p.key]}</div>
           <div style="font-size:1.6vw;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;opacity:0.7;margin-top:0.8vh">${p.name}</div>
         </div>`
      ).join('');
    }
    tick();
    const period = units.includes('s') ? 1000 : 30000;
    const id = setInterval(tick, period);
    mzTimers.push({ type: 'interval', id });
  }

  // ── Offline indicator ─────────────────────────────────────────────────────
  function setOffline(offline) {
    isOffline = offline;
    const dot = document.getElementById('offlineDot');
    if (dot) dot.style.display = offline ? 'flex' : 'none';
  }

  // ── Next-slide preloading (called during current slide's dwell) ───────────
  async function preloadNext() {
    if (!slides.length) return;
    const nextIdx = (current + 1) % slides.length;
    const next    = slides[nextIdx];
    try {
      if (next.type === 'designed' && next.canvasJson) {
        await preloadFontsForSlide(next.canvasJson);
      } else if (next.url) {
        await preload(next.url);
      }
    } catch(_) {}
  }

  // ── Watchdog: force-advance if slideshow stalls ───────────────────────────
  function resetWatchdog(dwell) {
    clearTimeout(watchdogHandle);
    const timeout = Math.max((dwell ?? defaultDwell) * 3, 45000); // min 45 s
    watchdogHandle = setTimeout(async () => {
      console.warn('[Watchdog] Playback stalled — forcing advance');
      try {
        if (analyticsOrgId) {
          await addDoc(collection(db, 'organizations', analyticsOrgId, 'analytics'), {
            type: 'watchdog_restart', screenId,
            slideshowId: currentSlideshowIdForAnalytics,
            timestamp:   new Date().toISOString(),
          });
        }
      } catch(_) {}
      advance();
    }, timeout);
  }

  // ── Nightly 3am reload (clears memory leaks after 24 h uptime) ───────────
  function scheduleNightlyReload() {
    setInterval(() => {
      if (Date.now() - PAGE_LOAD_TIME < 23 * 3600 * 1000) return; // need 23 h+
      const now = new Date();
      if (now.getHours() === 3 && now.getMinutes() === 0) {
        console.log('[Nightly] Reloading at 3 am after',
          Math.round((Date.now() - PAGE_LOAD_TIME) / 3600000), 'h uptime');
        window.location.reload();
      }
    }, 30 * 1000);
  }

  // ── Debug overlay (Ctrl+Shift+D) ──────────────────────────────────────────
  function updateDebugOverlay() {
    const el = document.getElementById('debugOverlay');
    if (!el || !debugVisible) return;
    const slide = slides[current];
    const mem   = performance.memory
      ? (performance.memory.usedJSHeapSize  / 1048576).toFixed(1) + ' / '
        + (performance.memory.jsHeapSizeLimit / 1048576).toFixed(1) + ' MB'
      : 'n/a';
    const uptimeMs  = Date.now() - PAGE_LOAD_TIME;
    const uptimeStr = uptimeMs < 3600000
      ? Math.round(uptimeMs / 60000) + ' min'
      : (uptimeMs / 3600000).toFixed(1) + ' h';
    const rows = [
      ['Screen ID',        screenId || '—'],
      ['Slideshow ID',     activeSlideshowId || '—'],
      ['Slide',            slides.length
        ? `${current + 1} / ${slides.length}  —  ${slide ? (slide.name || slide.type || 'image') : '?'}`
        : 'none'],
      ['Firebase',         isOffline ? '⚠ Offline (cached)' : '● Live',
                           isOffline ? 'dbg-warn' : 'dbg-ok'],
      ['Cache',            activeSlideshowId && loadCache(activeSlideshowId) ? '✓ present' : '✗ empty'],
      ['Last live update', lastUpdateTime ? new Date(lastUpdateTime).toLocaleTimeString() : 'never'],
      ['Uptime',           uptimeStr],
      ['Memory',           mem],
      ['Reconnect backoff', isOffline ? (reconnectBackoff / 1000).toFixed(0) + ' s' : '—'],
    ];
    el.innerHTML = '<div class="dbg-title">Debug  ·  Ctrl+Shift+D to close</div>'
      + rows.map(([k, v, cls]) =>
          `<div class="dbg-row"><span>${k}</span>`
        + `<span${cls ? ` class="${cls}"` : ''}>${v}</span></div>`
        ).join('');
  }

  setInterval(updateDebugOverlay, 1000);

  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.shiftKey && e.key === 'D') {
      e.preventDefault();
      debugVisible = !debugVisible;
      const el = document.getElementById('debugOverlay');
      if (el) el.style.display = debugVisible ? 'block' : 'none';
      updateDebugOverlay();
    }
  });

  // ── Crossfade ────────────────────────────────────────────────────────────────
  // Returns true if slide was shown, false if it should be skipped.
  const stageMultizone = document.getElementById('stageMultizone');
  let mzTimers = [];

  function stopMultizone() {
    mzTimers.forEach(t => { if (t.type === 'interval') clearInterval(t.id); else clearTimeout(t.id); });
    mzTimers = [];
    stageMultizone.innerHTML = '';
  }

  function _hideAllStages() {
    active.style.opacity         = "0";
    stageDesigned.style.opacity  = "0";
    stageVideo.style.opacity     = "0"; videoEl.pause(); videoEl.src = "";
    stageYoutube.style.opacity   = "0"; iframeYoutube.src = "about:blank";
    stageWebpage.style.opacity   = "0"; iframeWebpage.src = "about:blank";
    stageQr.style.opacity        = "0";
    stageWeather.style.opacity   = "0";
    stageCountdown.style.opacity = "0";
    stageMultizone.style.opacity = "0"; stopMultizone();
    stopClock();    stageClock.style.opacity   = "0";
    stopWeather();
    stopCountdown();
    stopTicker();
  }

  async function crossfadeTo(slide) {
    if (slide.type === "designed" && slide.canvasJson) {
      try {
        await loadDesignedSlide(slide.canvasJson);
      } catch(e) {
        console.error('[Skip] Designed slide failed:', e.message);
        return false;
      }
      stageDesigned.style.opacity = "1";
      active.style.opacity        = "0";
      stageVideo.style.opacity    = "0"; videoEl.pause(); videoEl.src = "";
      stageYoutube.style.opacity  = "0"; iframeYoutube.src = "about:blank";
      stageWebpage.style.opacity  = "0"; iframeWebpage.src = "about:blank";
      stageQr.style.opacity       = "0";
      stageWeather.style.opacity  = "0";
      stopClock();    stageClock.style.opacity   = "0";
      stopWeather();
      // Fire entrance animations after crossfade transition (1.2s CSS)
      if (pendingAnimations.length) {
        const batch = pendingAnimations.slice();
        pendingAnimations = [];
        setTimeout(() => {
          batch.forEach(({ obj, type, delay, duration, orig }) => {
            setTimeout(() => _runObjAnim(displayFabric, obj, type, duration * 1000, orig), delay * 1000);
          });
        }, 1200);
      }

    } else if (slide.type === "video") {
      _hideAllStages();
      videoEl.src              = slide.url;
      videoEl.play();
      stageVideo.style.opacity = "1";

    } else if (slide.type === "youtube") {
      _hideAllStages();
      const params  = "autoplay=1&mute=1&controls=0&loop=1&modestbranding=1&rel=0&playlist=" + slide.videoId;
      iframeYoutube.src          = `https://www.youtube.com/embed/${slide.videoId}?${params}`;
      stageYoutube.style.opacity = "1";

    } else if (slide.type === "webpage") {
      _hideAllStages();
      iframeWebpage.src          = slide.url;
      stageWebpage.style.opacity = "1";

    } else if (slide.type === "clock") {
      _hideAllStages();
      startClock(slide);
      stageClock.style.opacity = "1";

    } else if (slide.type === "qr") {
      _hideAllStages();
      renderQr(slide);
      stageQr.style.opacity = "1";

    } else if (slide.type === "weather") {
      _hideAllStages();
      renderWeather(slide);
      stageWeather.style.opacity = "1";

    } else if (slide.type === "countdown") {
      _hideAllStages();
      renderCountdown(slide);
      stageCountdown.style.opacity = "1";

    } else if (slide.type === "multizone") {
      _hideAllStages();
      renderMultizone(slide);
      stageMultizone.style.opacity = "1";

    } else {
      stopTicker();
      stopWeather();
      // Image slide
      const url = slide.url;
      const fit = slide.fit || "contain";
      const bg  = slide.bg  || "#000000";

      inactive.style.backgroundImage = `url('${url}')`;
      inactive.style.backgroundSize  = fit;
      inactive.style.backgroundColor = bg;

      try {
        await preload(url);
      } catch(_) {
        console.warn('[Skip] Image failed to load:', url);
        return false;
      }

      inactive.style.opacity      = "1";
      active.style.opacity        = "0";
      stageDesigned.style.opacity = "0";
      stageVideo.style.opacity    = "0"; videoEl.pause(); videoEl.src = "";
      stageYoutube.style.opacity  = "0"; iframeYoutube.src = "about:blank";
      stageWebpage.style.opacity  = "0"; iframeWebpage.src = "about:blank";
      stageQr.style.opacity       = "0";
      stageWeather.style.opacity  = "0";
      stopClock(); stageClock.style.opacity = "0";

      const tmp = active;
      active    = inactive;
      inactive  = tmp;
    }

    return true;
  }

  // ── Playback ──────────────────────────────────────────────────────────────
  function scheduleNext(dwell) {
    clearTimeout(timer);
    timer = setTimeout(advance, dwell);
    resetWatchdog(dwell);
    preloadNext().catch(() => {});
  }

  async function advance() {
    if (!slides.length) return;

    // Record duration of slide that just finished
    if (slideViewStart !== null) {
      const prev = slides[current];
      if (prev && analyticsOrgId) {
        const duration = Math.round((Date.now() - slideViewStart) / 1000);
        queueAnalyticsEvent({
          type:        'slide_view',
          screenId,
          slideshowId: currentSlideshowIdForAnalytics,
          slideId:     prev.id   || prev.name || String(current),
          slideName:   prev.name || prev.id   || 'Slide ' + (current + 1),
          duration,
        });
      }
    }

    // Try slides in order until one renders successfully.
    // Bounded to slides.length attempts so we can never loop forever.
    for (let attempt = 0; attempt < slides.length; attempt++) {
      current        = (current + 1) % slides.length;
      slideViewStart = Date.now();
      const slide    = slides[current];
      if (slide.expiresAt && new Date(slide.expiresAt).getTime() <= Date.now()) {
        continue; // silently skip expired slides discovered mid-playback
      }
      const ok       = await crossfadeTo(slide);
      if (ok) {
        scheduleNext(slide.dwell ?? defaultDwell);
        return;
      }
      console.warn(`[Skip] Slide ${current + 1}/${slides.length} failed, trying next`);
    }

    // Every slide failed
    console.error('[Error] All', slides.length, 'slides failed to display');
    showError('All slides failed to load. Check your content in the Admin Panel.');
  }

  async function applyPlaylist(data) {
    if (!data || !data.slides || !data.slides.length) {
      showError("No slides configured. Open the Admin Panel to add images.");
      return;
    }

    errBox.style.display = "none";
    loader.style.display = "none";

    // Expand groups into their individual slides, then filter active ones
    const nowMs = Date.now();
    const _isExpired = s => s.expiresAt && new Date(s.expiresAt).getTime() <= nowMs;
    const expanded = [];
    for (const s of data.slides) {
      if (s.active === false) continue;
      if (_isExpired(s))      continue;
      if (s.type === 'group' && Array.isArray(s.slides) && s.slides.length) {
        for (const gs of s.slides) {
          if (_isExpired(gs)) continue;
          expanded.push({ ...gs, type: 'designed', _groupName: s.name });
        }
      } else {
        expanded.push(s);
      }
    }
    const incoming = expanded.filter(s =>
      s.url || s.canvasJson ||
      s.type === 'clock' || s.type === 'weather' || s.type === 'youtube' ||
      s.type === 'countdown' || s.type === 'multizone'
    );

    if (!incoming.length) {
      showError("No active slides. Enable some slides in the Admin Panel.");
      return;
    }

    defaultDwell = (data.defaultDwell ?? 6) * 1000;
    const wasEmpty = slides.length === 0;
    if (current >= incoming.length) current = 0;
    slides = incoming;

    if (wasEmpty) {
      clearTimeout(timer);
      slideViewStart = Date.now();
      const ok = await crossfadeTo(slides[current]);
      if (ok) {
        scheduleNext(slides[current].dwell ?? defaultDwell);
      } else {
        advance(); // first slide failed — find one that works
      }
    }
  }

  // ── Slideshow subscription — exponential backoff reconnection ─────────────
  let slideshowUnsub = null;

  function subscribeToSlideshow(slideshowId) {
    if (slideshowUnsub) { slideshowUnsub(); slideshowUnsub = null; }
    clearTimeout(reconnectTimer);
    activeSlideshowId = slideshowId;

    // Serve cached content immediately so TV never goes black
    const cached = loadCache(slideshowId);
    if (cached) {
      loader.style.display = "none";
      errBox.style.display = "none";
      setOffline(true);
      applyPlaylist(cached);
    }

    slideshowUnsub = onSnapshot(
      doc(db, "slideshows", slideshowId),
      snap => {
        if (activeSlideshowId !== slideshowId) return; // stale callback — a newer show has taken over
        reconnectBackoff = 5000;         // reset backoff on any successful event
        lastUpdateTime   = Date.now();
        setOffline(false);
        if (snap.exists()) {
          const data = snap.data();
          saveCache(slideshowId, data);
          applyPlaylist(data);
        } else {
          loader.style.display = "none";
          showError("Slideshow '" + slideshowId + "' not found. Create it in the Admin Panel.");
        }
      },
      err => {
        if (activeSlideshowId !== slideshowId) return; // stale callback
        loader.style.display = "none";
        console.warn('[Firebase] Listener error:', err.code, err.message);

        const cached = loadCache(slideshowId);
        if (cached) {
          setOffline(true);
          applyPlaylist(cached);
        } else {
          showError("Firebase connection error: " + err.message);
        }

        // Retry with exponential backoff for connectivity errors.
        // Permission/not-found errors won't self-heal, so don't retry those.
        const retryable = ['unavailable', 'unknown', 'deadline-exceeded', 'internal'];
        if (!err.code || retryable.includes(err.code)) {
          slideshowUnsub = null;
          console.log(`[Reconnect] Retrying in ${reconnectBackoff / 1000} s`);
          reconnectTimer = setTimeout(() => subscribeToSlideshow(slideshowId), reconnectBackoff);
          reconnectBackoff = Math.min(reconnectBackoff * 2, MAX_BACKOFF);
        }
      }
    );
  }

  // ── Screen registration & slideshow assignment ────────────────────────────
  async function startNormalMode(resolvedScreenId) {
    screenId = resolvedScreenId;
    localStorage.setItem(STORAGE_KEY, screenId);

    let currentSlideshowId = null;
    const screenRef = doc(db, "screens", screenId);

    // Heartbeat every 5 min — admin detects offline within ~6 min.
    // IMPORTANT: never call heartbeat() from inside the screenRef onSnapshot
    // callback — doing so writes lastSeen → re-triggers the snapshot → infinite write loop.
    async function heartbeat() {
      try { await setDoc(screenRef, { lastSeen: new Date().toISOString() }, { merge: true }); }
      catch(e) {}
    }
    heartbeat();
    setInterval(heartbeat, 5 * 60 * 1000);

    // Emit analytics online event once we know orgId; offline on page unload
    function emitOnline(orgId) {
      if (!orgId || analyticsOrgId) return;
      analyticsOrgId = orgId;
      addDoc(collection(db, 'organizations', orgId, 'analytics'), {
        type: 'screen_online', screenId, timestamp: new Date().toISOString(),
      }).catch(() => {});
    }
    window.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden' && analyticsOrgId) {
        // Best-effort flush + offline event when tab is hidden/closed
        flushAnalytics();
        addDoc(collection(db, 'organizations', analyticsOrgId, 'analytics'), {
          type: 'screen_offline', screenId, timestamp: new Date().toISOString(),
        }).catch(() => {});
      }
    });

    // ── Schedule enforcement ─────────────────────────────────────────────────
    // Reads the assigned schedule doc from Firestore and switches the playing
    // slideshow at each minute boundary based on active time blocks.

    let baseShowId    = null;  // the screen doc's default slideshowId
    let activeSchedId = null;  // the scheduleId currently subscribed
    let schedData     = null;  // loaded schedule document data
    let schedUnsub    = null;  // onSnapshot unsubscribe for the schedule doc
    let schedMinTick  = null;  // setInterval handle for minute-boundary checks

    // Returns { dow: 0=Mon..6=Sun, mins: 0..1439 } for the screen's configured tz.
    function _tzNow() {
      const tz = screenTimezone && screenTimezone !== 'local' ? screenTimezone : undefined;
      try {
        const parts = new Intl.DateTimeFormat('en-US', {
          ...(tz ? { timeZone: tz } : {}),
          hourCycle: 'h23',
          weekday: 'short',
          hour: '2-digit', minute: '2-digit',
        }).formatToParts(new Date());
        const wkday = parts.find(p => p.type === 'weekday').value;
        const hour  = +parts.find(p => p.type === 'hour').value;
        const min   = +parts.find(p => p.type === 'minute').value;
        const wk    = { Mon:0, Tue:1, Wed:2, Thu:3, Fri:4, Sat:5, Sun:6 };
        return { dow: wk[wkday] ?? 0, mins: hour * 60 + min };
      } catch(e) {
        const d = new Date();
        return { dow: (d.getDay() + 6) % 7, mins: d.getHours() * 60 + d.getMinutes() };
      }
    }

    function _schedGetTarget() {
      if (!schedData || !Array.isArray(schedData.events)) return baseShowId;
      const { dow, mins } = _tzNow();
      for (const ev of schedData.events) {
        if (!Array.isArray(ev.days) || !ev.days.includes(dow)) continue;
        const start = (ev.startHour || 0) * 60 + (ev.startMin || 0);
        const end   = (ev.endHour   || 0) * 60 + (ev.endMin   || 0);
        if (mins >= start && mins < end) return ev.slideshowId || baseShowId;
      }
      return schedData.fillerSlideshowId || baseShowId;
    }

    function _schedApply() {
      if (whIsClosed) return;
      const target = _schedGetTarget();
      if (!target || target === activeSlideshowId) return;
      currentSlideshowIdForAnalytics = target;
      slides = []; current = 0; clearTimeout(timer);
      subscribeToSlideshow(target);
    }

    function _startSchedule(orgId, schedId) {
      if (schedUnsub)   { schedUnsub();                schedUnsub   = null; }
      if (schedMinTick) { clearInterval(schedMinTick); schedMinTick = null; }
      schedData = null;
      if (!schedId || !orgId) return;

      schedUnsub = onSnapshot(
        doc(db, 'organizations', orgId, 'schedules', schedId),
        snap => { schedData = snap.exists() ? snap.data() : null; _schedApply(); },
        err  => console.warn('[Schedule]', err.message)
      );
      schedMinTick = setInterval(_schedApply, 60 * 1000);
    }

    // ── Working Hours enforcement ────────────────────────────────────────────
    // When enabled, blacks out the display outside the configured window.
    let workingHours = null;   // { enabled, startHour, startMin, endHour, endMin, days[] }
    let whIsClosed   = false;
    let whMinTick    = null;
    const stageClosed = document.getElementById('stageClosed');

    function _whIsOpen() {
      if (!workingHours || !workingHours.enabled) return true;
      const days = Array.isArray(workingHours.days) ? workingHours.days : [];
      if (!days.length) return true;
      const { dow, mins } = _tzNow();
      if (!days.includes(dow)) return false;
      const start = (workingHours.startHour || 0) * 60 + (workingHours.startMin || 0);
      const end   = (workingHours.endHour   || 0) * 60 + (workingHours.endMin   || 0);
      if (start === end) return true;
      if (start < end) return mins >= start && mins < end;
      // wraps past midnight
      return mins >= start || mins < end;
    }

    function _whApply() {
      const open = _whIsOpen();
      if (open && whIsClosed) {
        whIsClosed = false;
        stageClosed.style.opacity = '0';
        // Resume: re-trigger schedule/slideshow
        if (activeSchedId) _schedApply();
        else if (baseShowId) {
          currentSlideshowIdForAnalytics = baseShowId;
          slides = []; current = 0; clearTimeout(timer);
          subscribeToSlideshow(baseShowId);
        }
      } else if (!open && !whIsClosed) {
        whIsClosed = true;
        clearTimeout(timer);
        stageClosed.style.opacity = '1';
      }
    }

    function _setWorkingHours(wh) {
      workingHours = wh || null;
      if (whMinTick) { clearInterval(whMinTick); whMinTick = null; }
      if (workingHours && workingHours.enabled) {
        whMinTick = setInterval(_whApply, 60 * 1000);
      } else if (whIsClosed) {
        whIsClosed = false;
        stageClosed.style.opacity = '0';
      }
      _whApply();
    }

    onSnapshot(
      screenRef,
      snap => {
        if (!snap.exists()) {
          const shortId = screenId.slice(0, 6).toUpperCase();
          setDoc(screenRef, {
            slideshowId:  "main",
            name:         "Screen " + shortId,
            registeredAt: new Date().toISOString(),
            // lastSeen omitted here — the heartbeat interval covers it and
            // writing it here would re-trigger this callback (write loop).
          }).catch(e => console.warn("Screen registration failed:", e.message));
          if (!activeSlideshowId) {
            baseShowId = "main";
            subscribeToSlideshow("main");
          }
        } else {
          const data       = snap.data();
          const newBaseId  = data.slideshowId || "main";
          const newSchedId = data.scheduleId  || null;
          const newOrgId   = data.orgId       || null;

          // NOTE: do NOT call heartbeat() here — it writes to screenRef which
          // re-fires this snapshot callback, causing an infinite write loop.
          emitOnline(newOrgId);
          baseShowId = newBaseId;
          screenTimezone = data.timezone || null;
          _setWorkingHours(data.workingHours || null);
          if (whIsClosed) return;

          if (newSchedId !== activeSchedId) {
            activeSchedId = newSchedId;
            _startSchedule(newOrgId, newSchedId);
          }

          if (activeSchedId) {
            // Schedule is in charge — re-evaluate in case base show or schedule changed
            _schedApply();
          } else if (newBaseId !== activeSlideshowId) {
            currentSlideshowIdForAnalytics = newBaseId;
            slides = []; current = 0; clearTimeout(timer);
            subscribeToSlideshow(newBaseId);
          }
        }
      },
      err => {
        console.warn("Screen listener error:", err.message);
        if (!activeSlideshowId) subscribeToSlideshow(baseShowId || "main");
      }
    );
  }

  async function initScreen() {
    // ?reset — clear local identity and show pairing screen
    if (urlParams.has("reset")) {
      localStorage.removeItem(STORAGE_KEY);
      window.history.replaceState({}, "", window.location.pathname);
      showReadyToConnect();
      return;
    }
    // Priority 1: Preview mode (?slideshow=xxx)
    if (previewId) { subscribeToSlideshow(previewId); return; }
    // Priority 2: Already registered screen (screenId in localStorage)
    if (screenId) { loader.style.display = "none"; await startNormalMode(screenId); return; }
    // Priority 3: No identity — show Ready to Connect pairing screen
    showReadyToConnect();
  }

  // ── Pairing UI ────────────────────────────────────────────────────────────
  function generatePairingCode() {
    const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
    let code = "";
    for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
  }

  async function showReadyToConnect() {
    loader.style.display = "none";
    const code = generatePairingCode();

    try {
      await setDoc(doc(db, "pairingCodes", code), {
        status:    "pending",
        createdAt: new Date().toISOString(),
        expiresAt: new Date(Date.now() + 60 * 60 * 1000).toISOString(),
      });
    } catch(e) { console.warn("Could not create pairing code:", e.message); }

    document.getElementById("pairingCodeEl").textContent = code;
    const pairEl = document.getElementById("pairingScreen");
    pairEl.style.display = "flex";

    // Use onSnapshot instead of polling — fires immediately when admin pairs,
    // zero repeated reads while waiting.
    const pairingUnsub = onSnapshot(doc(db, "pairingCodes", code), snap => {
      if (!snap.exists()) return;
      const data = snap.data();

      // Expired — generate a fresh code
      if (data.expiresAt && new Date() > new Date(data.expiresAt)) {
        pairingUnsub();
        pairEl.style.display = "none";
        showReadyToConnect();
        return;
      }

      // Admin claimed the code and assigned a screenId
      if (data.status === "paired" && data.screenId) {
        pairingUnsub();
        localStorage.setItem(STORAGE_KEY, data.screenId);
        screenId = data.screenId;
        pairEl.style.transition = "opacity 0.8s";
        pairEl.style.opacity = "0";
        setTimeout(() => { pairEl.style.display = "none"; startNormalMode(data.screenId); }, 800);
      }
    }, e => console.warn("Pairing listener error:", e.message));
  }

  scheduleNightlyReload();
  initScreen();
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }

  /* ── Crossfade stages ──────────────────────────────────────────────── */
  .stage {
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
    background-position: center center;
    background-size: contain;
    background-color: #000;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
    will-change: opacity;
  }
  #stageA        { z-index: 1; }
  #stageB        { z-index: 2; }
  #stageDesigned { z-index: 3; background: #000; }
  #stageVideo    { z-index: 4; background: #000; }
  #stageYoutube  { z-index: 5; background: #000; }
  #stageWebpage  { z-index: 6; background: #000; }
  #stageClock    { z-index: 7; background: #000; }
  #stageQr       { z-index: 8; background: #fff; }
  #stageWeather  { z-index: 9; background: #0f172a; }
  #stageCountdown { z-index: 9; background: #0f172a; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 4vw; }
  #stageCountdown .cd-label { font-size: 3.2vw; font-weight: 500; letter-spacing: 0.04em;
    opacity: 0.85; margin-bottom: 3vh; }
  #stageCountdown .cd-timer { display: flex; gap: 2.5vw; justify-content: center; align-items: flex-end; }
  #stageCountdown .cd-unit  { display: flex; flex-direction: column; align-items: center;
    min-width: 11vw; }
  #stageCountdown .cd-num   { font-size: 12vw; font-weight: 800; line-height: 1;
    font-variant-numeric: tabular-nums; }
  #stageCountdown .cd-name  { font-size: 1.6vw; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; opacity: 0.7; margin-top: 0.8vh; }
  #stageCountdown .cd-end   { font-size: 9vw; font-weight: 800; letter-spacing: -0.01em; }
  #stageMultizone { z-index: 9; background: #000; }
  .mz-zone { position: absolute; box-sizing: border-box; }
  .mz-zone-inner { position: absolute; width: 1920px; height: 1080px; transform-origin: top left; }

  #stageClosed   { z-index: 100; background: #000; opacity: 0; display: flex;
    align-items: center; justify-content: center; color: #555;
    font-family: 'Segoe UI', Arial, sans-serif; font-size: 28px; letter-spacing: 0.5px; }
  #clockEl {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .clock-time {
    font-size: 15vw;
    line-height: 1;
  }
  .clock-date {
    font-size: 2.5vw;
    margin-top: 0.5em;
    opacity: 0.75;
  }

  #iframeYoutube, #iframeWebpage {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none;
  }
  #videoEl {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* Fabric canvas fills the designed stage */
  #stageDesigned .canvas-container,
  #stageDesigned canvas {
    display: block;
  }

  /* ── QR Code stage ─────────────────────────────────────────────────── */
  #qrEl canvas, #qrEl img {
    display: block;
    border-radius: 12px;
  }

  /* ── Weather stage ──────────────────────────────────────────────────── */
  .wx-wrap        { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
  /* Hero: left = city info, right = big conditions */
  .wx-hero        { flex: 1; display: flex; align-items: center; padding: 0 7vw; gap: 5vw; min-height: 0; }
  .wx-left        { flex: 1; }
  .wx-city-name   { font-size: 4.5vw; font-weight: 800; letter-spacing: -0.01em; text-transform: uppercase; line-height: 1.1; }
  .wx-city-region { font-size: 1.8vw; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.3em; }
  .wx-meta        { font-size: 1.5vw; opacity: 0.5; margin-top: 3em; }
  .wx-right       { display: flex; align-items: center; gap: 1vw; flex-shrink: 0; }
  .wx-icon        { width: 11vw; height: 11vw; }
  .wx-temp-desc   { display: flex; flex-direction: column; }
  .wx-temp        { font-size: 12vw; font-weight: 700; letter-spacing: -0.04em; line-height: 1; }
  .wx-desc        { font-size: 1.9vw; opacity: 0.75; margin-top: 0.15em; }
  /* Hero centered variant (no forecast) */
  .wx-hero.wx-centered { flex-direction: column; justify-content: center; text-align: center; gap: 0; padding: 6vw; }
  .wx-centered .wx-city-name  { font-size: 3.2vw; }
  .wx-centered .wx-right      { justify-content: center; margin: 0.5vw 0; }
  .wx-centered .wx-icon       { width: 13vw; height: 13vw; }
  .wx-centered .wx-temp       { font-size: 14vw; }
  .wx-centered .wx-desc       { font-size: 2.2vw; text-align: center; }
  .wx-centered .wx-meta       { margin-top: 1em; }
  /* Forecast strip */
  .wx-forecast    { display: flex; flex-shrink: 0; padding: 2vw 5vw; }
  .wx-fday        { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.45em; padding: 0 0.5vw; }
  .wx-fday-label  { font-size: 1.2vw; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.45; }
  .wx-fday-date   { font-size: 2.1vw; font-weight: 700; line-height: 1; }
  .wx-fday-icon   { width: 4.5vw; height: 4.5vw; }
  .wx-fday-temps  { font-size: 1.8vw; }
  .wx-fday-hi     { font-weight: 700; }
  .wx-fday-lo     { opacity: 0.5; margin-left: 0.4em; }
  .wx-fday-desc   { font-size: 1.15vw; opacity: 0.6; text-align: center; line-height: 1.2; }
  .wx-loading, .wx-error { font-size: 1.8vw; opacity: 0.5; }

  /* ── Ticker overlay ────────────────────────────────────────────────── */
  #tickerWrap {
    position: absolute;
    left: 0; right: 0;
    z-index: 20;
    overflow: hidden;
    display: none;
    pointer-events: none;
  }
  #tickerWrap.ticker-top    { top: 0; }
  #tickerWrap.ticker-bottom { bottom: 0; }
  .ticker-badge {
    position: absolute; left: 0; top: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    background: #f07c00;
    color: #fff;
    font-weight: 700;
    font-size: 1.2em;
    white-space: nowrap;
    z-index: 2;
    padding: 0 18px;
    letter-spacing: 0.08em;
  }
  .ticker-track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    will-change: transform;
    animation: tickerScroll linear infinite;
  }
  @keyframes tickerScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ── Loader ────────────────────────────────────────────────────────── */
  #loader {
    position: absolute; inset: 0; z-index: 25;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0a0a0a; color: #555;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid #222;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 18px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* ── Ready to Connect screen ───────────────────────────────────────── */
  #pairingScreen {
    display: none; position: absolute; inset: 0; z-index: 40;
    background: #050a14; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px; padding: 40px; text-align: center; color: #fff;
  }
  .pairing-logo {
    display: flex; align-items: center; gap: 10px;
  }
  .pairing-zmark {
    width: 42px; height: 42px; border: 3px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 22px; color: #fff;
  }
  .pairing-wordmark {
    font-size: 26px; font-weight: 700; letter-spacing: 4px; color: #fff;
  }
  #pairingScreen h2 {
    font-size: 30px; font-weight: 600; margin: 0; color: #fff;
  }
  #pairingCodeEl {
    font-family: 'Courier New', monospace; font-size: 76px; font-weight: 700;
    letter-spacing: 20px; color: #fff; line-height: 1;
    background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.12);
    padding: 28px 52px 28px 72px; border-radius: 20px;
    animation: codePulse 2.8s ease-in-out infinite;
  }
  @keyframes codePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.10); }
    50%       { box-shadow: 0 0 0 22px rgba(255,255,255,0); }
  }
  .pairing-instruction {
    font-size: 16px; color: rgba(255,255,255,0.5);
    line-height: 1.8; max-width: 440px; margin: 0;
  }
  .pairing-instruction strong { color: rgba(255,255,255,0.85); font-weight: 600; }
  .pairing-url {
    font-size: 13px; color: rgba(255,255,255,0.22);
    font-family: 'Courier New', monospace; letter-spacing: 0.04em; margin: 0;
  }

  /* ── Error overlay ─────────────────────────────────────────────────── */
  #errBox {
    display: none;
    position: absolute; inset: 0; z-index: 30;
    background: #0a0a0a;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 40px; text-align: center;
  }
  #errBox svg { opacity: 0.3; }
  #errMsg {
    font-size: 15px; color: #666;
    max-width: 520px; line-height: 1.7;
    letter-spacing: 0.01em;
  }
  #errBox small {
    font-size: 11px; color: #333;
    letter-spacing: 0.05em; text-transform: uppercase;
  }

  /* ── Offline indicator ─────────────────────────────────────────────────── */
  #offlineDot {
    display: none;
    position: fixed;
    bottom: 18px; right: 18px;
    z-index: 50;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.55);
    border-radius: 20px;
    padding: 4px 10px 4px 8px;
    pointer-events: none;
    backdrop-filter: blur(4px);
  }
  .offline-circle {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f07c00;
    flex-shrink: 0;
    animation: offlinePulse 2s ease-in-out infinite;
  }
  .offline-label {
    font-size: 11px; color: #ccc;
    letter-spacing: 0.06em; text-transform: uppercase;
    font-weight: 500;
  }
  @keyframes offlinePulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }

  /* ── Debug overlay (Ctrl+Shift+D) ──────────────────────────────────────── */
  #debugOverlay {
    display: none;
    position: fixed;
    top: 20px; left: 20px;
    z-index: 999;
    background: rgba(0,0,0,0.88);
    color: #ccc;
    font-family: 'Courier New', monospace;
    font-size: 13px;
